<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Received | Blackline Web Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#c0392b;--red-bright:#e74c3c;--black:#080808;--dark:#0e0e0e;--panel:#141414;--border:#1f1f1f;--white:#f4f4f4;--grey:#777;--light-grey:#bbb;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:88px;background:rgba(8,8,8,0.97);border-bottom:1px solid var(--border);}
.nav-logo img{height:50px;display:block;filter:drop-shadow(0 0 14px rgba(192,57,43,0.4));}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;overflow:hidden;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(192,57,43,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(192,57,43,0.09) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.card{background:var(--panel);border:1px solid var(--border);padding:64px 56px;max-width:560px;width:100%;text-align:center;position:relative;z-index:1;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),transparent);}
.check{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--red-bright);line-height:1;margin-bottom:16px;}
.title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;color:var(--white);line-height:1;margin-bottom:16px;}
.subtitle{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--red-bright);font-weight:600;margin-bottom:28px;}
.body{font-size:16px;color:var(--grey);line-height:1.8;margin-bottom:40px;}
.body strong{color:var(--light-grey);}
.btn{display:inline-block;background:var(--red);color:var(--white);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:16px 36px;transition:background 0.2s,transform 0.2s;}
.btn:hover{background:var(--red-bright);transform:translateY(-2px);}
.divider{width:50px;height:2px;background:var(--red);margin:0 auto 40px;}
footer{background:var(--black);padding:28px 60px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-size:12px;color:#444;letter-spacing:1px;}
.footer-tag{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;}
@media(max-width:600px){nav{padding:0 24px;}.card{padding:44px 28px;}footer{padding:24px;flex-direction:column;gap:10px;text-align:center;}}
</style>
